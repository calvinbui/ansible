---

postgres_image: "public.ecr.aws/docker/library/postgres"
postgres_command: null

postgres_directory: "{{ config_directory }}/postgres"
postgres_directory_extra: []
postgres_directories: "{{ [postgres_directory + ':/var/lib/postgresql'] + postgres_directory_extra }}"

postgres_name: "{{ application }}-postgres"
postgres_user: "{{ application }}"
postgres_password: "changeme"
postgres_database: "{{ application }}"

postgres_uid: 999
postgres_gid: 999
