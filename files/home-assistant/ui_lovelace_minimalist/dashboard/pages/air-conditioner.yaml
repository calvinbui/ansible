---

title: Air Conditioner
path: air-conditioner
icon: mdi:air-conditioner

type: custom:grid-layout
layout:
  grid-template-columns: 1fr 40% 40% 1fr
  grid-template-areas: |
    ". controls rooms ."
    ". controls temps ."
  mediaquery:
    "(max-width: 800px)":
      grid-template-columns: 100%
      grid-template-areas: |
        "controls"
        "rooms"
        "temps"

cards:
  -
    type: vertical-stack
    view_layout:
      grid-area: controls
    cards:
      -
        type: custom:simple-thermostat
        entity: climate.daikin_airbase
        decimals: 0
        step_size: 1
        unit: false
        layout:
          step: row
          mode:
            names: true
            icons: true
            headings: false
        hide:
          temperature: true
          state: true
          setpoint_label: true
        entities:
          -
            entity: climate.daikin_airbase
            name: Currently
            attribute: current_temperature
            template: '{{ state.raw | formatNumber }} <span class="temperature-unit">°C</span>'
        control:
          hvac:
            _name: Mode
            "off":
              name: "Off"
            heat:
              name: Heat
            cool:
              name: Cool
            heat_cool:
              name: Auto
            dry:
              name: Dry
            fan_only:
              name: Fan
          fan:
            _name: Fan
            _icons: true
            Auto:
              icon: mdi:fan-auto
            Low:
              icon: mdi:fan-speed-1
            Mid:
              icon: mdi:fan-speed-2
            High:
              icon: mdi:fan-speed-3
            Low/Auto:
              icon: mdi:fan-speed-1
            Mid/Auto:
              icon: mdi:fan-speed-2
            High/Auto:
              icon: mdi:fan-speed-3
        header: false
        styles: |
            ha-card {
              --st-font-size-l: 2rem;
              --st-font-size-xl: 2rem;
              --st-mode-border-radius: 4px;
            }

            .current--value:not(.current--off)::after {
              content: "°C";
              align-self: flex-start;
              font-size: 0.48em;
              line-height: 1;
              margin-left: 0.08em;
              margin-top: 0.20em;
            }

            .entity-value .temperature-unit {
              font-size: 0.65em;
              line-height: 1;
              margin-left: 0.08em;
              position: relative;
              top: -0.25em;
            }

            /* move entity rows below the setpoint */
            .body {
              grid-auto-flow: row !important;
              grid-template-columns: minmax(0, 1fr);
              justify-items: center;
            }

            .entities {
              grid-row-start: 2;
              padding-block: 0;
            }

            .entity-heading {
              padding-right: 0;
            }

            .controls {
              padding: 0 15px !important;
              gap: 4px;
            }

            /* keep HVAC controls above fan controls after v4 sorting */
            .modes.hvac {
              order: 1;
            }

            .modes.fan {
              order: 2;
              margin-top: 4px;
            }

            .controls .modes.hvac,
            .controls .modes.fan {
              display: grid !important;
              grid-auto-flow: row !important;
              gap: 4px !important;
            }

            .controls .modes.hvac .mode-item,
            .controls .modes.fan .mode-item {
              box-sizing: border-box;
              min-width: 0 !important;
              min-height: 0 !important;
              padding-block: 6px !important;
              text-transform: capitalize;
            }

            /* hvac mode columns */
            .controls .modes.hvac {
              grid-template-columns: repeat(3, minmax(0, 1fr)) !important;
              grid-template-rows: repeat(2, 48px) !important;
            }

            .controls .modes.hvac .mode-item {
              height: 48px !important;
            }

            .modes.hvac > .mode-item.off {
              grid-column: 1;
              grid-row: 1;
            }

            .modes.hvac > .mode-item.heat {
              grid-column: 2;
              grid-row: 1;
            }

            .modes.hvac > .mode-item.cool {
              grid-column: 3;
              grid-row: 1;
            }

            .modes.hvac > .mode-item.heat_cool,
            .modes.hvac > .mode-item.auto {
              grid-column: 1;
              grid-row: 2;
            }

            .modes.hvac > .mode-item.dry {
              grid-column: 2;
              grid-row: 2;
            }

            .modes.hvac > .mode-item.fan_only {
              grid-column: 3;
              grid-row: 2;
            }

            /* fan modes columns */
            .controls .modes.fan {
              grid-template-columns: repeat(12, minmax(0, 1fr)) !important;
              grid-template-rows: repeat(2, 48px) !important;
            }

            .controls .modes.fan .mode-item {
              height: 48px !important;
            }

            .modes.fan > .mode-item.auto,
            .modes.fan > .mode-item.Auto {
              grid-column: 1 / span 3;
              grid-row: 1;
            }

            .modes.fan > .mode-item.low,
            .modes.fan > .mode-item.Low {
              grid-column: 4 / span 3;
              grid-row: 1;
            }

            .modes.fan > .mode-item.mid,
            .modes.fan > .mode-item.Mid,
            .modes.fan > .mode-item.medium,
            .modes.fan > .mode-item.Medium {
              grid-column: 7 / span 3;
              grid-row: 1;
            }

            .modes.fan > .mode-item.high,
            .modes.fan > .mode-item.High {
              grid-column: 10 / span 3;
              grid-row: 1;
            }

            .modes.fan > .mode-item.LowAuto,
            .modes.fan > .mode-item.lowauto,
            .modes.fan > .mode-item.low_auto {
              grid-column: 1 / span 4;
              grid-row: 2;
            }

            .modes.fan > .mode-item.MidAuto,
            .modes.fan > .mode-item.midauto,
            .modes.fan > .mode-item.mid_auto {
              grid-column: 5 / span 4;
              grid-row: 2;
            }

            .modes.fan > .mode-item.HighAuto,
            .modes.fan > .mode-item.highauto,
            .modes.fan > .mode-item.high_auto {
              grid-column: 9 / span 4;
              grid-row: 2;
            }
      -
        type: entities
        entities:
          - entity: input_datetime.daikin
            name: Date
            secondary_info: last-updated
        show_header_toggle: true
        state_color: false

  -
    type: vertical-stack
    view_layout:
      grid-area: rooms
    cards:
      -
        type: horizontal-stack
        cards:
          -
            primary: Downstairs Common
            secondary: |
              {% set temps = [
                states('sensor.living_room_temperature_humidity_sensor_temperature') | float,
                states('sensor.dining_room_temperature_humidity_sensor_temperature') | float,
                states('sensor.kitchen_temperature_humidity_sensor_temperature') | float
              ] %}
              {% set humidity = [
                states('sensor.living_room_temperature_humidity_sensor_humidity') | float,
                states('sensor.dining_room_temperature_humidity_sensor_humidity') | float,
                states('sensor.kitchen_temperature_humidity_sensor_humidity') | float
              ] %}
              {{ (temps | sum / temps | length) | round(0) }}°C / {{ (humidity | sum / humidity | length) | round(0) }}%
            icon: mdi:theater
            entity: switch.daikin_airbase_living
            <<: &air_conditioning_room
              type: custom:mushroom-template-card
              layout: vertical
              icon_color: '{{ "#253e5c" if is_state(config.entity, "on") else "" }}'
              tap_action:
                action: toggle
              card_mod:
                style: |
                  {% if is_state(config.entity, "on") %}
                    ha-card {
                      --card-background-color: #8fb3f4;
                      --primary-text-color: #253e5c;
                      --secondary-text-color: #253e5c;
                    }
                  {% endif %}
          -
            primary: Master Bedroom
            secondary: |
              {{ states('sensor.master_bedroom_temperature_humidity_sensor_temperature') | int(0) }}°C / {{ states('sensor.master_bedroom_temperature_humidity_sensor_humidity') | int(0) }}%
            icon: mdi:bed-king
            entity: switch.daikin_airbase_master
            <<: *air_conditioning_room
      -
        type: horizontal-stack
        cards:
          -
            primary: Tammy's Study
            secondary: |
              {{ states('sensor.tammy_s_study_temperature_humidity_sensor_temperature') | int(0) }}°C / {{ states('sensor.tammy_s_study_temperature_humidity_sensor_humidity') | int(0) }}%
            icon: mdi:face-woman
            entity: switch.daikin_airbase_tammy_study
            <<: *air_conditioning_room
          -
            primary: Calvin's Study
            secondary: |
              {{ states('sensor.calvin_s_study_temperature_humidity_sensor_temperature') | int(0) }}°C / {{ states('sensor.calvin_s_study_temperature_humidity_sensor_humidity') | int(0) }}%
            icon: mdi:face-man
            entity: switch.daikin_airbase_calvin_study
            <<: *air_conditioning_room
      -
        type: horizontal-stack
        cards:
          -
            primary: Large Bedroom
            secondary: |
              {{ states('sensor.large_rear_bedroom_temperature_humidity_sensor_temperature') | int(0) }}°C / {{ states('sensor.large_rear_bedroom_temperature_humidity_sensor_humidity') | int(0) }}%
            icon: mdi:bed
            entity: switch.daikin_airbase_large_bed
            <<: *air_conditioning_room
          -
            primary: Kai's Bedroom
            secondary: |
              {{ states('sensor.kai_s_bedroom_temperature_humidity_sensor_temperature') | int(0) }}°C / {{ states('sensor.kai_s_bedroom_temperature_humidity_sensor_humidity') | int(0) }}%
            icon: mdi:baby-face
            entity: switch.daikin_airbase_kai_bedroom
            <<: *air_conditioning_room

  -
    view_layout:
      grid-area: temps
    type: entities
    entities:
      -
        <<: &temp_row
          type: custom:multiple-entity-row
          show_state: false
        name: Garage
        icon: mdi:garage
        entity: sensor.garage_temperature_humidity_sensor_battery
        entities:
          - entity: sensor.garage_temperature_humidity_sensor_temperature
            name: Temperature
            format: precision0
          - entity: sensor.garage_temperature_humidity_sensor_humidity
            name: Humidity
            format: precision0
      -
        <<: *temp_row
        name: Laundry
        icon: mdi:washing-machine
        entity: sensor.laundry_temperature_humidity_sensor_battery
        entities:
          - entity: sensor.laundry_temperature_humidity_sensor_temperature
            name: Temperature
            format: precision0
          - entity: sensor.laundry_temperature_humidity_sensor_humidity
            name: Humidity
            format: precision0
      -
        <<: *temp_row
        name: Ensuite
        icon: mdi:toilet
        entity: sensor.ensuite_temperature_humidity_sensor_battery
        entities:
          - entity: sensor.ensuite_temperature_humidity_sensor_temperature
            name: Temperature
            format: precision0
          - entity: sensor.ensuite_temperature_humidity_sensor_humidity
            name: Humidity
            format: precision0
      -
        <<: *temp_row
        name: Downstairs Bathroom
        icon: mdi:shower-head
        entity: sensor.downstairs_bathroom_temperature_humidity_sensor_battery
        entities:
          - entity: sensor.downstairs_bathroom_temperature_humidity_sensor_temperature
            name: Temperature
            format: precision0
          - entity: sensor.downstairs_bathroom_temperature_humidity_sensor_humidity
            name: Humidity
            format: precision0
      -
        <<: *temp_row
        name: Upstairs Bathroom
        icon: mdi:shower
        entity: sensor.upstairs_bathroom_temperature_humidity_sensor_battery
        entities:
          - entity: sensor.upstairs_bathroom_temperature_humidity_sensor_temperature
            name: Temperature
            format: precision0
          - entity: sensor.upstairs_bathroom_temperature_humidity_sensor_humidity
            name: Humidity
            format: precision0
      -
        <<: *temp_row
        name: Foyer
        icon: mdi:shoe-sneaker
        entity: sensor.foyer_temperature_humidity_sensor_battery
        entities:
          - entity: sensor.foyer_temperature_humidity_sensor_temperature
            name: Temperature
            format: precision0
          - entity: sensor.foyer_temperature_humidity_sensor_humidity
            name: Humidity
            format: precision0
