---

- hosts: homeserver

  vars:
    application: tracearr

    tracearr_mattermost_webhook_id: !vault |
      $ANSIBLE_VAULT;1.1;AES256
      66663866396132336433653266353562363039616331633530643435323133333135323065353833
      3364373238343366396364393466653238633233373231330a633761666132333566336439383935
      35613835376237313165613162393931306136326232623836373136623233363732383665353639
      6237663739323331370a373062613933343064623161663032333066336630326433386364636132
      34666635376435356638643030646333643333643230316238353634656238663032

    container_network: "{{ networks.pub }}"

  handlers:
    - name: Restart apprise
      containers.podman.podman_container:
        name: "{{ application }}-apprise"
        force_restart: true

  tasks:
    - name: Create config folder
      ansible.builtin.file:
        path: "{{ config_directory }}"
        state: directory
        owner: "{{ common_user }}"
        group: "{{ common_root_group }}"
        mode: "0771"

    - name: Create postgres container
      ansible.builtin.include_role:
        name: postgres
      vars:
        postgres_image: docker.io/timescale/timescaledb-ha
        postgres_version: pg18.1-ts2.25.0
        postgres_password: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          34326336646463633234323732366136353438326461626366343662636664383264633434663133
          6138363866343536386237636632323233333936376164640a383161366130666132666366646634
          31643866363537626235303532303337383061636230373836666339653436333632346238323733
          3232623135613638350a633433386136326534356433636635623833363762663561303732303461
          38333736393038613866303061643238666162633534376635653135613034626163626534643738
          6432353762636436633362303735323534306335633837643565
        postgres_directories:
          - "{{ config_directory }}/postgres:/home/postgres/pgdata/data"
        postgres_uid: 1000
        postgres_gid: 1000

    - name: Create valkey container
      ansible.builtin.include_role:
        name: valkey
      vars:
        valkey_version: 9.0.3
        valkey_password: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          62623762393336623461343839626431323462333430616163623432653561613365303565643963
          6163363362376334303837376332663937336434373434380a643936386466623931613965303834
          39336331623930666131653331656466353163373536616564666166613066343139666662313032
          3066323530616230620a336535653731643764376438623630663835323637323864326339393438
          31323838356535353966653762633862623634353166396465623933326638653862333937373664
          3137633166646639633261343662643632643038323434323931

    - name: Create apprise folder
      ansible.builtin.file:
        path: "{{ config_directory }}/apprise"
        state: directory
        owner: "{{ common_user }}"
        group: "{{ common_group }}"
        mode: "0771"

    - name: Create apprise htpasswd file
      community.general.htpasswd:
        path: "{{ config_directory }}/apprise/htpasswd"
        name: "{{ item.name }}"
        password: "{{ item.password }}"
        mode: "0644"
        owner: "{{ common_root_id }}"
        group: "{{ common_root_group }}"
      no_log: true
      loop:
        - name: "{{ application }}"
          password: !vault |
            $ANSIBLE_VAULT;1.1;AES256
            37626663373632366261656261646434326161346336653561613735636534346639396161653635
            3165643138376134393363363931396164663430646234360a633937646335343038373031336634
            38366563366532633466396562626131643639313061306666373633333964323238656630326362
            3336376535323330330a343733633336653735636139656336643062373738363532346134653463
            34636338656632663531646637663263656631353335366462393664613130613839

    - name: Create apprise location-override file
      ansible.builtin.copy:
        content: |
          auth_basic            "Apprise API Restricted Area";
          auth_basic_user_file  /etc/nginx/.htpasswd;
        dest: "{{ config_directory }}/apprise/location-override.conf"
        mode: "0644"
        owner: "{{ common_root_id }}"
        group: "{{ common_root_group }}"
      notify: Restart apprise

    - name: Create apprise server-override file
      ansible.builtin.copy:
        content: |
          location ~ ^/status/?$ {
            auth_basic off;
            proxy_pass http://apprise_upstream;
            proxy_http_version 1.1;
            proxy_set_header Connection "";
            proxy_set_header Accept-Encoding "";
            proxy_set_header Transfer-Encoding "";
            proxy_set_header Host $host;
            proxy_set_header X-Forwarded-Host $host;
            proxy_set_header X-Real-IP $remote_addr;
            proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
            proxy_connect_timeout 1s;
            proxy_send_timeout 2s;
            proxy_read_timeout 2s;
            proxy_buffering off;
            access_log off;
            add_header Cache-Control "no-store" always;
          }
        dest: "{{ config_directory }}/apprise/server-override.conf"
        mode: "0644"
        owner: "{{ common_root_id }}"
        group: "{{ common_root_group }}"
      notify: Restart apprise

    - name: Create apprise container
      ansible.builtin.include_role:
        name: podman_container
      vars:
        container_name: "{{ application }}-apprise"
        image: docker.io/caronc/apprise:v1.3.2
        env:
          APPRISE_ALLOW_SERVICES: mmosts
          APPRISE_STATELESS_URLS: "mmosts://mattermost.{{ common_tld }}/{{ tracearr_mattermost_webhook_id }}"
          APPRISE_STATEFUL_MODE: disabled
          APPRISE_CONFIG_LOCK: "yes"
          APPRISE_WORKER_COUNT: "1"
        volumes:
          - "{{ config_directory }}/apprise/location-override.conf:/etc/nginx/location-override.conf:ro"
          - "{{ config_directory }}/apprise/server-override.conf:/etc/nginx/server-override.conf:ro"
          - "{{ config_directory }}/apprise/htpasswd:/etc/nginx/.htpasswd:ro"
        blackbox:
          protocol: http
          host: "{{ application }}-apprise:8000"
          path: /status

    - name: Create container
      ansible.builtin.include_role:
        name: podman_container
      vars:
        image: ghcr.io/connorgallopo/tracearr:1.4.22
        env:
          NODE_ENV: production

          DATABASE_URL: "{{ _postgres_url }}"

          REDIS_URL: "{{ _valkey_url }}"

          JWT_SECRET: !vault |
            $ANSIBLE_VAULT;1.1;AES256
            30323434363834343965646538316436323835343930656231633165303537373637396434626565
            6230303532386361346331663462323633633137623830660a666532303035386663636332623034
