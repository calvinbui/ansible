---

- hosts: octopi

  vars:
    application: acme.sh

  tasks:
    - name: Create repo folder
      ansible.builtin.file:
        path: "{{ config_directory }}/repo"
        state: directory
        owner: "{{ common_root_id }}"
        group: "{{ common_root_group }}"
        mode: "0700"

    - name: Install dependencies
      ansible.builtin.apt:
        name:
          - ca-certificates
          - socat
          - python3-openssl
        state: present
        update_cache: true
        cache_valid_time: 86400

    - name: Download Neilpang's acme.sh
      ansible.builtin.git:
        repo: https://github.com/acmesh-official/acme.sh.git
        dest: "{{ config_directory }}/repo"
        version: 3.1.1

    - name: Setup acme.sh
      ansible.builtin.shell: |
        ./acme.sh --install \
        --home "{{ config_directory }}/install" \
        --config-home "{{ config_directory }}/config" \
        --cert-home "{{ config_directory }}/certs" \
        --accountemail "{{ common_email_username }}" \
        --log "{{ config_directory }}/{{ application }}.log"
      args:
        chdir: "{{ config_directory }}/repo"
        executable: "/bin/bash"
      changed_when: false

    - name: Create scripts directories
      ansible.builtin.file:
        path: "{{ config_directory }}/scripts"
        state: directory
        owner: "{{ common_root_id }}"
        group: "{{ common_root_group }}"
        mode: "0775"

    - name: Copy scripts
      ansible.builtin.template:
        src: "{{ files_directory }}/{{ item.script }}"
        dest: "{{ config_directory }}/scripts/{{ item.script }}"
        mode: "0755"
      loop: "{{ cert_domains }}"

    - name: Setup Cloudflare creds
      ansible.builtin.lineinfile:
        path: "{{ config_directory }}/config/account.conf"
        regex: "{{ item.regex }}"
        line: "{{ item.line | default(omit) }}"
        state: "{{ item.state | default('present') }}"
      loop:
        - regex: "^SAVED_CF_Token"
          line: "SAVED_CF_Token='{{ cloudflare_api_token }}'"
      vars:
        cloudflare_api_token: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          30386261646637323863623436383438633931653530313430313861383531643738383939383333
          6162646133633639613731643138343864326539666464360a656637393861313039306262366638
          64656563343736383362316339653561343430383637356135616337343732623562343039313039
          3033393133613339310a633439633236666435376431303863643737613330653536353633316531
          62623138653832633462353732656562666662366361393030363431623130313634653635313036
          62663932636631343165303061303031643238643233343834393331336237363762613630383432
          633433663161383966666335663133643362

    - name: Generate certs for each domain
      ansible.builtin.shell: |
        /bin/bash -ic \
          ". acme.sh.env && acme.sh \
          --issue \
          {{ item.method }} \
          --keylength {{ item.keylength }} \
          --domain {{ item.domain }} \
          --post-hook '{{ config_directory }}/scripts/{{ item.script }} {{ item.script_args }}'"
      args:
        chdir: "{{ config_directory }}/install"
        executable: /bin/bash
      register: result
      loop: "{{ cert_domains }}"
      failed_when: result.rc == 1 or result.rc == 127
      changed_when: result.rc == 0
