---

- hosts: homeserver

  vars:
    application: changedetection

    changedetection_browserless_token: !vault |
      $ANSIBLE_VAULT;1.1;AES256
      61626437336535613435656164373833636466323931346665306366333364353230313233386365
      3865336566396438653363336236316465646261663062380a666339626532356262373939386365
      35353831376331633934363566393030323933613732383537666265333532656233643933353735
      6335383534373339620a616431326338393530363034353538663832353166633131306265626234
      63346665383630313865636337393365313538656362393964373330646237313332633661353039
      65343563313763626330303363386334383466363736316565663039353134626439666330653661
      393639633836346335626432613734626234

    container_network: "{{ networks.pub }}"

  tasks:
    # - name: Create playwright container
    #   ansible.builtin.include_role:
    #     name: podman_container
    #   vars:
    #     container_name: "{{ application }}-chrome"
    #     image: ghcr.io/browserless/chromium:v2.49.0
    #     env:
    #       TOKEN: "{{ changedetection_browserless_token }}"
    #       CONCURRENT: "10"
    #       TIMEOUT: "60000"

    - name: Create "{{ application }}" container
      ansible.builtin.include_role:
        name: podman_container
      vars:
        image: ghcr.io/dgtlmoon/changedetection.io:0.55.5
        ip: "{{ container_network.subnet | ansible.utils.nthhost(9) }}"
        env:
          BASE_URL: "https://{{ application }}.{{ common_tld }}"

          # PLAYWRIGHT_DRIVER_URL: "ws://{{ application }}-chrome:3000?token={{ changedetection_browserless_token }}&stealth=true"
          PLAYWRIGHT_DRIVER_URL: "wss://production-sfo.browserless.io/chromium/stealth?token={{ changedetection_browserless_token }}"

          PUID: "{{ common_user_id | ansible.builtin.string }}"
          PGID: "{{ common_group_id | ansible.builtin.string }}"
        volumes:
          - "{{ config_directory }}:/datastore"
        traefik:
          - port: 5000
        homepage:
          name: Change Detection
          group: Tools
          weight: 100
          description: "Website change detection"
          widget:
            type: changedetectionio
            url: https://{{ application }}.{{ common_tld }}
            key: !vault |
              $ANSIBLE_VAULT;1.1;AES256
              32383631616238623937663766393861623062373133356434333061333133393037313937353735
              3134323437363630666430366466636338376134363663640a643232323338343261303036386135
              34353337643539636238633966306131663733343738383964653961653430666164313232333531
              3438333933326136660a636333383633613733343930396231623634363430373838356638663634
              64393965306338613135343035353232393132316564336239376361376161653138323936343061
              3633353965653062316564376436373732316237623633343232
