    - name: Create rag api container
      ansible.builtin.include_role:
        name: podman_container
      vars:
        container_name: "{{ application }}-rag-api"
        image: ghcr.io/danny-avila/librechat-rag-api-dev@sha256:c3e1a05bdd576b5000fa0e8a84a476e9858fa9219b2b5d78432ddce12c9fcf23
        env:
          RAG_OPENAI_API_KEY: "{{ openai_api_key }}"

          POSTGRES_DB: "{{ _postgres_database }}"
          POSTGRES_USER: "{{ _postgres_username }}"
          POSTGRES_PASSWORD: "{{ _postgres_password }}"
          DB_HOST: "{{ _postgres_hostname }}"
          DB_PORT: "{{ _postgres_port | ansible.builtin.string }}"

          EMBEDDINGS_PROVIDER: openai
          EMBEDDINGS_MODEL: text-embedding-3-small

    - name: Create configuration
      ansible.builtin.copy:
        content: |
          ---
          # https://www.librechat.ai/docs/configuration/librechat_yaml

          version: 1.3.12

          interface:
            mcpServers:
              use: true
              create: true

            parameters: false
            prompts: false
            agents: false

          mcpSettings:
            allowedAddresses:
              - "garmin-mcp:8000"

          registration:
            socialLogins: ["openid"]

          summarization:
            enabled: true
            provider: openAI
            model: gpt-5.4-nano

          webSearch:
            searchProvider: searxng
            searxngInstanceUrl: "${SEARXNG_INSTANCE_URL}"

            scraperProvider: firecrawl
            firecrawlApiKey: "${FIRECRAWL_API_KEY}"
            firecrawlApiUrl: "${FIRECRAWL_API_URL}"
            firecrawlVersion: "${FIRECRAWL_VERSION}"
            firecrawlOptions:
              timeout: 15000

            rerankerType: jina
            jinaApiKey: "${JINA_API_KEY}"

            safeSearch: 0

          modelSpecs:
            enforce: true
            prioritize: true
            list:
              - name: gpt-5.5
                label: GPT-5.5
                default: true
                webSearch: true
                fileSearch: true
                executeCode: true
                preset:
                  endpoint: openAI
                  model: gpt-5.5

        dest: "{{ config_directory }}/librechat.yaml"
        owner: "{{ common_user }}"
        group: "{{ common_group }}"
        mode: "0600"
      notify: Restart

