---

- hosts: homeserver

  vars:
    application: librechat

    container_network: "{{ networks.pub }}"

  handlers:
    - name: Restart
      containers.podman.podman_container:
        name: "{{ application }}"
        force_restart: true

  tasks:
    - name: Create config folder
      ansible.builtin.file:
        path: "{{ config_directory }}/{{ item }}"
        state: directory
        owner: "{{ common_user }}"
        group: "{{ common_root_group }}"
        mode: "0771"
      loop:
        - images
        - uploads
        - logs
        - searxng

    - name: Create SearXNG configuration
      ansible.builtin.copy:
        content: |
          use_default_settings: true

          server:
            secret_key: "{{ oidc_auth.librechat.secret | ansible.builtin.hash('sha256') }}"
            limiter: false

          search:
            formats:
              - html
              - json

        dest: "{{ config_directory }}/searxng/settings.yml"
        owner: "{{ common_user }}"
        group: "{{ common_group }}"
        mode: "0600"

    - name: Create SearXNG container
      ansible.builtin.include_role:
        name: podman_container
      vars:
        container_name: "{{ application }}-searxng"
        image: ghcr.io/searxng/searxng:latest
        env:
          SEARXNG_BASE_URL: "http://{{ application }}-searxng:8080/"
        volumes:
          - "{{ config_directory }}/searxng/settings.yml:/etc/searxng/settings.yml"

    - name: Create Firecrawl valkey container
      ansible.builtin.include_role:
        name: valkey
      vars:
        valkey_name: "{{ application }}-firecrawl-valkey"
        valkey_directory: "{{ config_directory }}/firecrawl-valkey"
        valkey_version: 9.1.0
        valkey_password: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          36653539303364356362323861306233656332313832336236363139323730336265313838346438
          3432623864373262633838336538366233613938653562390a616330383536323230396266396463
          33633337303366396132353835326139646162616231633034633333663634306336336466373232
          3032656336316562300a386335326530326533666161633534343832363432336465356136333162
          62613731396363396639356361303432666539613664656634646466656336316437336536616530
          6538353562316532646432323835303833373231653262363838

    - name: Set Firecrawl valkey variables
      ansible.builtin.set_fact:
        _firecrawl_valkey_url: "{{ _valkey_url }}"
      no_log: true

    - name: Create Firecrawl RabbitMQ container
      ansible.builtin.include_role:
        name: podman_container
      vars:
        container_name: "{{ application }}-firecrawl-rabbitmq"
        image: public.ecr.aws/docker/library/rabbitmq:4.3.2
        command: rabbitmq-server
        healthcheck: rabbitmq-diagnostics -q check_running
        healthcheck_start_period: 5s
        healthcheck_interval: 5s
        healthcheck_timeout: 5s
        healthcheck_retries: 3

    - name: Create Firecrawl queue postgres container
      ansible.builtin.include_role:
        name: postgres
      vars:
        postgres_name: "{{ application }}-firecrawl-postgres"
        postgres_image: ghcr.io/firecrawl/nuq-postgres
        postgres_version: latest
        postgres_directory: "{{ config_directory }}/firecrawl-postgres"
        postgres_command: "postgres -c cron.database_name={{ application }}"
        postgres_password: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          62343664343865323337323062626161343335393464626335333130623339373436623835363638
          6465623938313432623939613264353863333739376266380a393731346337323333363439393833
          38323334613930373736383664643561376361343039393462626330616231653132643762636139
          3938333563323530640a653534646439373935343262386535376665393632353461373561336365
          62386365633166313231616434383438323638643563663639633663653436393430356465376139
          6235643362333634346364303337363762636666666232623362

    - name: Set Firecrawl postgres variables
      ansible.builtin.set_fact:
        _firecrawl_postgres_hostname: "{{ _postgres_hostname }}"
        _firecrawl_postgres_port: "{{ _postgres_port }}"
        _firecrawl_postgres_username: "{{ _postgres_username }}"
        _firecrawl_postgres_password: "{{ _postgres_password }}"
        _firecrawl_postgres_database: "{{ _postgres_database }}"
      no_log: true

    - name: Create Firecrawl Playwright container
      ansible.builtin.include_role:
        name: podman_container
      vars:
        container_name: "{{ application }}-firecrawl-playwright"
        image: ghcr.io/firecrawl/playwright-service:latest
        env:
          PORT: "3000"
          ALLOW_LOCAL_WEBHOOKS: "true"
          BLOCK_MEDIA: "true"
          MAX_CONCURRENT_PAGES: "4"
        tmpfs:
          /tmp/.cache: noexec,nosuid,size=1g

    - name: Create Firecrawl API container
      ansible.builtin.include_role:
        name: podman_container
      vars:
        container_name: "{{ application }}-firecrawl-api"
        image: ghcr.io/firecrawl/firecrawl:2.11.68
        command:
          - node
          - dist/src/harness.js
          - --start-docker
        env:
          HOST: "0.0.0.0"
          PORT: "3002"
          EXTRACT_WORKER_PORT: "3004"
          WORKER_PORT: "3005"
          ENV: local
          USE_DB_AUTHENTICATION: "false"
          NUM_WORKERS_PER_QUEUE: "4"
          CRAWL_CONCURRENT_REQUESTS: "4"
          MAX_CONCURRENT_JOBS: "2"
          BROWSER_POOL_SIZE: "2"
          HARNESS_STARTUP_TIMEOUT_MS: "60000"
          REDIS_URL: "{{ _firecrawl_valkey_url }}"
          REDIS_RATE_LIMIT_URL: "{{ _firecrawl_valkey_url }}"
          NUQ_RABBITMQ_URL: "amqp://{{ application }}-firecrawl-rabbitmq:5672"
          POSTGRES_USER: "{{ _firecrawl_postgres_username }}"
          POSTGRES_PASSWORD: "{{ _firecrawl_postgres_password }}"
          POSTGRES_DB: "{{ _firecrawl_postgres_database }}"
          POSTGRES_HOST: "{{ _firecrawl_postgres_hostname }}"
          POSTGRES_PORT: "{{ _firecrawl_postgres_port | ansible.builtin.string }}"
          PLAYWRIGHT_MICROSERVICE_URL: "http://{{ application }}-firecrawl-playwright:3000/scrape"
          SEARXNG_ENDPOINT: "http://{{ application }}-searxng:8080"

    - name: Create mongodb container
      ansible.builtin.include_role:
        name: mongodb
      vars:
        mongo_version: 8.3.4
        mongo_password: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          37303330326665623962396535636234373439313438393837306236313465356633373231623430
          3233633766363765346535323765333136303833343337380a323663333637656661633331343939
