          3537633236333663340a646261303839383862613065373930643065653238333437346432323635
          36386138653962373432353364343762653931363661356537323139343561303365

    - name: Create valkey container
      ansible.builtin.include_role:
        name: valkey
      vars:
        valkey_version: 9.1.0
        valkey_password: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          31363137373531666231613134656662313238306131643764363638336533333363326566353837
          6664646135393634633630333437636662346636396639310a663961636434653737666165386663
