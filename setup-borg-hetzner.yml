---

- hosts: localhost

  gather_facts: false
  become: false

  tasks:
    - name: Create backup locations on Hetzner
      ansible.builtin.command: >-
        ssh -p{{ _borg_repository_hetzner.port }}
        {{ _borg_repository_hetzner.username }}@{{ _borg_repository_hetzner.hostname }}
        mkdir -p borg/{{ '{' }}{{ borgmatic_backups | ansible.builtin.map(attribute='name') | ansible.builtin.flatten | ansible.builtin.join(',') }}{{ '}' }}
      changed_when: false
      become: false
      delegate_to: localhost
      vars:
        _borg_repository_hetzner: "{{ (borg_repositories | ansible.builtin.selectattr('name', 'equalto', 'hetzner') | ansible.builtin.selectattr('protocol', 'equalto', 'ssh') | ansible.builtin.list | ansible.builtin.first) }}"
