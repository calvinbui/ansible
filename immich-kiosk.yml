---

- hosts: homeserver

  vars:
    application: immich-kiosk

    container_network: "{{ networks.pub }}"

  tasks:
    - name: Create config folder
      ansible.builtin.file:
        path: "{{ config_directory }}"
        state: directory
        owner: "{{ common_user }}"
        group: "{{ common_group }}"
        mode: "0771"

    - name: Create config
      ansible.builtin.copy:
        content: |
          # https://docs.immichkiosk.app/configuration/#configyaml

          immich_api_key: "{{ _immich_api_key }}"
          immich_url: "http://immich-server:2283"

          show_time: true
          time_format: 12
          show_date: true
          date_format: DDDD D MMMM YYYY
          clock_source: client

          duration: 10

          albums:
            - 439e6de4-9ab5-4441-9ce1-ea994c6863ef@tammy # Digital Photo Frame
            - d9cde0fe-8323-4477-a6f3-d9927a543a26@calvin # Kai Maternity Photoshoot Story Lens
            - 2f267e6f-0a99-40df-8e1b-e8756ca4c4a5@calvin # Kai Newborn Photoshoot Story Lens
            - 0231aaa0-dcf2-42e3-95c7-41331205b30d@calvin # Hanbok Photoshoot South Korea Bomyou
            - f55ff40a-1f80-45fe-874e-f883430ec144@calvin # Jeju Photoshoot Detailed Edit Soymilk
            - 7630c8d6-00e6-44b0-89f0-9cb3009b7612@calvin # RTW 2023 - New York (curated)
            - e6bdb8f2-464e-438e-a4d7-eb18312157b3@calvin # RTW 2023 - Tokyo (curated)
            - dec659c9-5e56-4089-b288-2b86ebde72e3@calvin # RTW 2023 - Spain (curated)
            - 0f030ab8-495e-4bc4-b7cf-f9a1fd302fc3@calvin # Paris Photoshoot 2023 (Edited)
            - 99ff622b-40a6-4a0b-9b09-6ee1d8020fde@calvin # RTW 2023 - France (curated)
            - 15f8dbc9-ae5f-4409-9d74-8c2006aaed27@calvin # RTW 2023 - Switzerland (curated)
            - 099c9976-6511-4d40-9bd5-80e5172e6a95@calvin # RTW 2023 - Venice (curated)
            - b9201652-3edd-4f3f-9d5d-f85af28f53d3@calvin # RTW 2023 - Pisa (curated)
            - 2bcc074e-ef94-4264-af49-dc972c8aa405@calvin # RTW 2023 - Florence (curated)
            - 285d946e-5b72-4236-a5be-82a4f5a88b25@calvin # RTW 2023 - Rome (curated)
            - b9bc9157-ae35-40d2-9805-53977f716784@calvin # RTW 2023 - Vatican City (Curated)
            - 9788ab69-2937-4f8e-93c5-5423231c7bbc@calvin # RTW 2023 - Santorini (Curated)

          disable_navigation: true
          show_progress_bar: true
          theme: bubble
          layout: splitview

          show_videos: false
          live_photos: false
          live_photo_loop_delay: 0

          show_owner: false
          show_album_name: true
          show_person_name: true
          show_person_age: true
          show_image_time: true
          image_time_format: 12
          show_image_date: true
          image_date_format: MMMM YYYY
          show_image_location: true
          show_more_info: false
          show_more_info_image_link: false
          show_more_info_qr_code: false

          weather:
            locations:
              - name: home
                lat: {{ weather.lat }}
                lon: {{ weather.lon }}
                api: "{{ weather.api_key }}"
                unit: metric
                lang: {{ common_language_iso_639 }}
                forecast: true
                default: true

          immich_users_api_keys:
            calvin: "{{ _immich_api_key }}"
            tammy: "{{ tammy_api_key }}"

          disable_sleep: true

          kiosk:
            disable_url_queries: true
            disable_config_endpoint: true
            enable_url_builder: false
            watch_config: true
            fetched_assets_size: 1000
            http_timeout: 20
        dest: "{{ config_directory }}/config.yaml"
        mode: "0644"
      vars:
        _immich_api_key: !vault |
          $ANSIBLE_VAULT;1.1;AES256
          38316365313735383666303965363662353633333566643235636566353861366361336465653263
          3536653436626462306631386665333438313838656662610a656331313239653238343561316661
