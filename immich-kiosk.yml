          name: !vault |
            $ANSIBLE_VAULT;1.1;AES256
            36303735633166383639323266356336376139306630336438353732373235656237383365326161
            3234313935663763613233343664303932323866643064370a653666666633376439646532316538
            64313235376666613038333933373962386530303563303130643831363364646330353834633838
            3266363263393530630a376237663038383664383838303439346466393530643234333931613837
            33323434333662336638356433643139333233343265316265646661353039653763
          lat: !vault |
            $ANSIBLE_VAULT;1.1;AES256
            38333130643232646363316533333662613865303738323831313462336162323332616435356631
            6462393864303336643165353439313838636130306137320a663639356631323764626664336230
            63353235303839313336663466326535343036636266646461633731303766363231313435616164
